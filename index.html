<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solar Panel Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Solar Panel Tracker</h1>
    <nav>
      <button onclick="showPage('solar')">Solar Data</button>
      <button onclick="showPage('payment')">Payments</button>
    </nav>
  </header>

  <!-- Solar Panel Page -->
  <section id="page-solar" class="page active">
    <h2>Solar Entry Add Karo</h2>
    <form id="solar-form">
      <label>Naam</label>
      <input type="text" id="s-name" placeholder="Ramesh Kumar" required />

      <label>Phone</label>
      <input type="tel" id="s-phone" placeholder="98765 43210" required />

      <label>Sheher</label>
      <input type="text" id="s-city" placeholder="Indore" required />

      <label>District</label>
      <input type="text" id="s-district" placeholder="Indore" />

      <label>Status</label>
      <select id="s-status">
        <option value="needed">Chahiye (Need)</option>
        <option value="installed">Lag chuka (Installed)</option>
        <option value="potential">Soch rahe hain</option>
      </select>

      <label>Panel count</label>
      <input type="number" id="s-panels" placeholder="4" min="1" />

      <label>Bijli bill (monthly ₹)</label>
      <input type="number" id="s-bill" placeholder="1500" />

      <button type="submit">Save Karo</button>
    </form>

    <h2>Saved Solar Entries</h2>
    <table id="solar-table">
      <thead>
        <tr>
          <th>Naam</th><th>Sheher</th><th>Status</th>
          <th>Panels</th><th>Bill</th>
        </tr>
      </thead>
      <tbody id="solar-body"></tbody>
    </table>
  </section>

  <!-- Payment Page -->
  <section id="page-payment" class="page">
    <h2>Payment Add Karo</h2>
    <form id="payment-form">
      <label>Naam</label>
      <input type="text" id="p-name" placeholder="Ramesh Kumar" required />

      <label>Phone</label>
      <input type="tel" id="p-phone" placeholder="98765 43210" required />

      <label>Total Amount (₹)</label>
      <input type="number" id="p-total" placeholder="80000" required />

      <label>Jama Amount (₹)</label>
      <input type="number" id="p-paid" placeholder="30000" oninput="calcDue()" />

      <label>Baki Amount (₹)</label>
      <input type="number" id="p-due" readonly placeholder="auto" />

      <label>Status</label>
      <select id="p-status">
        <option value="pending">Pending</option>
        <option value="partial">Partial</option>
        <option value="paid">Paid</option>
      </select>

      <label>Payment Tarika</label>
      <select id="p-method">
        <option value="cash">Cash</option>
        <option value="upi">UPI / GPay</option>
        <option value="bank">Bank Transfer</option>
        <option value="cheque">Cheque</option>
        <option value="emi">EMI</option>
      </select>

      <label>Date</label>
      <input type="date" id="p-date" />

      <button type="submit">Save Karo</button>
    </form>

    <h2>Payment History</h2>
    <table id="pay-table">
      <thead>
        <tr>
          <th>Naam</th><th>Total</th><th>Jama</th>
          <th>Baki</th><th>Status</th><th>Tarika</th>
        </tr>
      </thead>
      <tbody id="pay-body"></tbody>
    </table>
  </section>

  <script src="app.js"></script>
  <script src="payments.js"></script>
</body>
</html>
